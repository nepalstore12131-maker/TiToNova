<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Script Generator | Titonova</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #0f172a;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .output {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>AI Video Script Generator</h1>

  <p>Enter your topic and generate a video script using AI.</p>

  <input type="text" id="topic" placeholder="e.g. How to make money online">

  <button onclick="generateScript()">Generate Script</button>

  <div class="output" id="result"></div>

  <a href="index.html">← Back to Home</a>

</div>

<script>
async function generateScript() {
  let topic = document.getElementById("topic").value;

  if (!topic) {
    alert("Please enter a topic");
    return;
  }

  document.getElementById("result").innerText = "Generating...";

  try {
    const res = await fetch("http://localhost:3000/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ topic })
    });

    const data = await res.json();

    document.getElementById("result").innerText = data.result;

  } catch (error) {
    document.getElementById("result").innerText = "Error connecting to AI";
  }
}
</script>

</body>
</html>
